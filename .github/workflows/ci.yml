name: CI

# Lint + type-check + unit tests on every PR. The eval-gate (RAGAS thresholds)
# runs on a label or workflow_dispatch — it burns Groq quota and isn't worth
# running on every push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        # Loose gate; tighten after the langchain bump (#7b).
        run: mypy app/ --ignore-missing-imports || echo "mypy advisory only for now"

  lint-fe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint . --max-warnings=0

  unit:
    runs-on: ubuntu-latest
    needs: lint-py
    env:
      # Settings() instantiates at import time; supply dummy values so
      # pytest collection doesn't crash on required-field validators.
      # Unit tests don't hit any of these services — values just need to
      # be present and non-placeholder. Real secrets live in eval-gate only.
      PINECONE_API_KEY: ci-dummy-not-used-by-unit-tests
      HF_TOKEN: ci-dummy-not-used-by-unit-tests
      GROQ_API_KEY: ci-dummy-not-used-by-unit-tests
      SECRET_KEY: ci-dummy-secret-min-32-chars-for-jwt-validator
      DEBUG: "true"  # also relaxes the SECRET_KEY placeholder validator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -m "not slow"

  eval-gate:
    # Opt-in: trigger via PR label `eval` or manual dispatch. RAGAS hits Groq
    # which is rate-limited on the free tier (30 req/min, 14.4k/day).
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'eval'))
    runs-on: ubuntu-latest
    needs: lint-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -m slow tests/eval/
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  docker-build:
    # Validation only on PR; push to GHCR on main.
    runs-on: ubuntu-latest
    needs: [lint-py, lint-fe]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase repo name for GHCR
        id: repo
        # GHCR requires lowercase repository names; github.repository may
        # contain uppercase characters (e.g. VinayKomakula21/Medical-ChatBot).
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
