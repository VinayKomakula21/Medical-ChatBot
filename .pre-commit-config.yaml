# Run on every commit. Install with:  pre-commit install
# Manually run on all files with:      pre-commit run --all-files
#
# mypy intentionally NOT in pre-commit — it walks the import graph and is too
# slow for a commit gate. Mypy runs in CI instead (.github/workflows/ci.yml,
# added in Item #8 of IMPROVEMENT_PLAN.md).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
